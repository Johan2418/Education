services:
  # ─── PostgreSQL ────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: arcanea-db
    restart: unless-stopped
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-arcanea}
      POSTGRES_USER: ${POSTGRES_USER:-arcanea_admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-arcanea_admin} -d ${POSTGRES_DB:-arcanea}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ─── PostgREST ─────────────────────────────────────────────
  postgrest:
    image: postgrest/postgrest:v12.2.3
    container_name: arcanea-api
    restart: unless-stopped
    ports:
      - "${POSTGREST_PORT:-3000}:3000"
    environment:
      PGRST_DB_URI: postgres://${POSTGREST_DB_USER:-authenticator}:${POSTGREST_DB_PASSWORD:-web_anon_pass}@db:5432/${POSTGRES_DB:-arcanea}
      PGRST_DB_SCHEMAS: ${POSTGREST_DB_SCHEMAS:-api}
      PGRST_DB_ANON_ROLE: ${POSTGREST_DB_ANON_ROLE:-web_anon}
      PGRST_JWT_SECRET: ${POSTGREST_JWT_SECRET:?Set POSTGREST_JWT_SECRET in .env}
      PGRST_DB_MAX_ROWS: ${POSTGREST_DB_MAX_ROWS:-1000}
      PGRST_OPENAPI_SERVER_PROXY_URI: ${POSTGREST_OPENAPI_PROXY:-http://localhost:3000}
    depends_on:
      db:
        condition: service_healthy

  # ─── Swagger UI (documentación interactiva de la API) ─────
  swagger:
    image: swaggerapi/swagger-ui:latest
    container_name: arcanea-docs
    restart: unless-stopped
    ports:
      - "${SWAGGER_PORT:-8080}:8080"
    environment:
      API_URL: http://localhost:${POSTGREST_PORT:-3000}/
    depends_on:
      - postgrest

  # ─── Backend con LibreOffice para conversión PPTX -> PDF ───
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: arcanea-backend
    restart: unless-stopped
    ports:
      - "${BACKEND_CONTAINER_PORT:-9082}:8082"
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    environment:
      LIBREOFFICE_PATH: soffice
      DB_HOST: db
      DB_PORT: 5432
      HUGGINGFACE_BASE_URL: http://ollama:11434
      LIBRO_IA_BASE_URL: http://ollama:11434
      LIBRO_ANALYSIS_BASE_URL: http://ollama:11434
      LIBRO_MCP_BASE_URL: http://ollama:11434

  # ─── Ollama (LLM local) ───────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: arcanea-ollama
    restart: unless-stopped
    ports:
      - "${OLLAMA_PORT:-11434}:11434"
    environment:
      OLLAMA_KEEP_ALIVE: ${OLLAMA_KEEP_ALIVE:-5m}
    volumes:
      - ollama_data:/root/.ollama
    gpus: all
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 15s
      timeout: 10s
      retries: 10

  ollama-bootstrap:
    image: alpine:3.20
    container_name: arcanea-ollama-bootstrap
    restart: "no"
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      OLLAMA_HOST: http://ollama:11434
      OLLAMA_CANDIDATE_MODELS: ${OLLAMA_CANDIDATE_MODELS:-qwen2.5:1.5b,qwen2.5:3b,qwen2.5:latest,llama3.2:3b,phi3:mini}
      LIBRO_ANALYSIS_MODEL: ${LIBRO_ANALYSIS_MODEL:-arcanea-analysis:latest}
      LIBRO_MCP_MODEL: ${LIBRO_MCP_MODEL:-arcanea-mcp:latest}
      LIBRO_ANALYSIS_BASE_MODEL: ${LIBRO_ANALYSIS_BASE_MODEL:-qwen2.5:latest}
      LIBRO_MCP_BASE_MODEL: ${LIBRO_MCP_BASE_MODEL:-qwen2.5:3b}
      LIBRO_MODEL_TRAINING_REVISION: ${LIBRO_MODEL_TRAINING_REVISION:-2026.05.0}
    volumes:
      - ./ops/ollama:/opt/arcanea/ollama:ro
    entrypoint:
      - /bin/sh
      - -lc
      - apk add --no-cache curl jq >/dev/null && /bin/sh /opt/arcanea/ollama/bootstrap-models.sh

volumes:
  pgdata:
    driver: local
  ollama_data:
    driver: local
